#
# Test config for credential manager integration. Mirrors test.cfg with
# [general] secrets_manager = bitwarden and a [github:credentials]
# subsection so dispatch tests can exercise the perceval flag emission.
#

[general]
short_name = Grimoire
update = false
min_update_delay = 10
update_hour = 9
debug = true
logs_dir = logs
bulk_size = 100
scroll_size = 100
secrets_manager = bitwarden

[projects]
projects_file = test-projects.json

[es_collection]
url = http://localhost:9200

[es_enrichment]
url = http://localhost:9200
autorefresh = false

[sortinghat]
host = 127.0.0.1
user = admin
password = admin
port = 8000
path = api/
ssl = false
database = test_sh
affiliate = true
unaffiliated_group = Unknown
autoprofile = [customer,git,github]
matching = [email]
sleep_for = 120

[panels]
kibiter_time_from= "now-30y"
kibiter_default_index= "git"
kibiter_url = http://localhost:5601

[phases]
collection = true
identities = true
enrichment = true
panels = true

[git]
raw_index = git_test-raw
enriched_index = git_test
studies = []

[github:credentials]
item-name = github-prod

[github]
raw_index = github_test-raw
enriched_index = github_test
api-token = XXXXX
sleep-for-rate = true
archive-path = /tmp/test_github_archive
category = issue
sleep-time = 300

[github:pull]
raw_index = github_test-raw-pull
enriched_index = github_test-pull
api-token = XXXXX
sleep-for-rate = true
archive-path = /tmp/test_github_archive
category = pull_request
sleep-time = 300
